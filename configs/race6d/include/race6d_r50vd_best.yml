task: pose_estimation
model: RACE6D
criterion: RACE6DCriterion_addr
postprocessor: RACE6DPostProcessor
use_focal_loss: True
num_keypoints: 32
eval_spatial_size: [480, 640] # h w

RACE6D:
  backbone: PResNet
  encoder: HybridEncoder
  decoder: RACE6DTransformer_DQE

PResNet:
  depth: 50
  variant: d
  freeze_at: -1
  return_idx: [1, 2, 3]
  num_stages: 4
  freeze_norm: False
  pretrained: True

HybridEncoder:
  in_channels: [512, 1024, 2048]
  feat_strides: [8, 16, 32]

  # intra
  hidden_dim: 256
  use_encoder_idx: [2]
  num_encoder_layers: 1
  nhead: 8
  dim_feedforward: 1024
  dropout: 0.
  enc_act: 'gelu'

  expansion: 1.0
  depth_mult: 1
  act: 'silu'

RACE6DTransformer_DQE:
  feat_channels: [256, 256, 256]
  feat_strides: [8, 16, 32]
  hidden_dim: 256
  num_levels: 3
  num_layers: 3
  num_queries: 50
  eval_idx: -1
  num_points: [4, 4, 4]
  cross_attn_method: default
  query_select_method: default
  vis_enc: True
  activation: silu
  mlp_act: silu

RACE6DPostProcessor:
  num_top_queries: 50
  vis_enc: True

RACE6DCriterion_addr:
  weight_dict: {loss_vfl: 1, loss_bbox: 5, loss_giou: 2, loss_keypoints: 1, loss_oks: 1, loss_cr: 0.1, loss_pose: 20}
  losses: ['vfl', 'boxes', 'pose', 'keypoint']
  alpha: 0.75
  gamma_pos: 1.0
  gamma_neg: 2.0
  num_classes: 8
  coco_path: ~/Downloads/lmo/
  category_file: ./configs/race6d/include/lmo2coco_category.yml

  matcher:
    type: HungarianMatcher
    weight_dict: {cost_class: 2, cost_bbox: 5, cost_giou: 2}
    alpha: 0.25
    gamma: 2.0
